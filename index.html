<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OHMMISHOPS</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(
180deg,
#d9c2ff 0%,
#c7a4ff 50%,
#b388ff 100%
);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.logo{
display:block;
width:260px;
max-width:90%;
margin:20px auto;
}

.slider{
width:100%;
overflow:hidden;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.15);
margin-bottom:25px;
}

.slider img{
width:100%;
display:block;
}

.promo-box{
background:white;
padding:20px;
border-radius:20px;
margin:20px 0;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.promo-title{
color:#6a1b9a;
font-size:34px;
font-weight:900;
margin:0;
}

.promo-sub{
font-size:18px;
font-weight:bold;
margin-top:12px;
}

h1{
text-align:center;
font-size:42px;
margin-top:20px;
color:#4a148c;
}

p{
text-align:center;
font-size:22px;
}

.login-btn{
display:block;
width:220px;
margin:30px auto;
padding:16px;
background:#7c4dff;
color:white;
text-decoration:none;
text-align:center;
border-radius:15px;
font-size:24px;
font-weight:bold;
}

.game-menu{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin:25px 0;
}

.game-box{
background:white;
padding:12px 20px;
border-radius:15px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.products-title{
font-size:42px;
font-weight:bold;
margin-top:50px;
color:#4a148c;
text-align:center;
}

#products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.product-card{
background:white;
padding:8px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
display:flex;
flex-direction:column;
}

.product-card img{
width:100%;
height:85px;
object-fit:cover;
border-radius:10px;
margin-bottom:6px;
}

.product-name{
font-size:11px;
font-weight:bold;
text-align:center;
line-height:1.2;
height:30px;
overflow:hidden;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
}

.product-price{
font-size:14px;
font-weight:bold;
color:#7c4dff;
text-align:center;
margin:5px 0;
}

.buy-btn{
display:block;
background:#1877f2;
color:white;
text-align:center;
padding:6px;
border-radius:8px;
text-decoration:none;
font-size:10px;
font-weight:bold;
margin-top:auto;
}
footer{
text-align:center;
margin:60px 0 30px;
font-size:18px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<img
class="logo"
src="file_000000004a4871fa820d19cb5d6f8996.png"
alt="OHMMISHOPS">

<div class="slider">
<img id="slide"
src="file_000000002318720b827b073681dd573e.png">
</div>

<div class="promo-box">

<h2 class="promo-title">
🌟ยินดีบริการ🌟 24ชั่วโมง ส่งไวของถึงมือปลอดภัย
</h2>

<div class="promo-sub">
🎮 Roblox•🔥 Free Fire•⚔️ MLBB
</div>

</div>

<h1>ยินดีต้อนรับสู่ OHMMISHOPS</h1>

<p>ร้านจำหน่ายไอดีเกมและไอเท็ม</p>

<a href="login.html" class="login-btn">
เข้าสู่ระบบ
</a>

<div class="game-menu">

<div class="game-box">
🎮 Roblox
</div>

<div class="game-box">
🔥 Free Fire
</div>

<div class="game-box">
⚔️ MLBB
</div>

</div>

<div class="products-title">
รายการสินค้า
</div>

<div id="products"></div>

<footer>
OHMMISHOPS © 2026
</footer>

</div>

<script type="module">

import { initializeApp }
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getDatabase,
ref,
onValue
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig = {
apiKey: "AIzaSyC1aaMNIa7gfr9y6mHbIZU-OZIsq3yLSAU",
authDomain: "ohmmishops-68928.firebaseapp.com",
databaseURL: "https://ohmmishops-68928-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ohmmishops-68928",
storageBucket: "ohmmishops-68928.firebasestorage.app",
messagingSenderId: "64123880266",
appId: "1:64123880266:web:0317d55de24fc705d137b3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const slides = [
"file_000000002318720b827b073681dd573e.png",
"file_00000000b8c0720bbb5251a2ce12afc2.png",
"slide3.png"
];

let current = 0;

setInterval(() => {

current++;

if(current >= slides.length){
current = 0;
}

const slide = document.getElementById("slide");

if(slide){
slide.src = slides[current];
}

},4000);

onValue(ref(db,"products"),(snapshot)=>{

let html = "";

if(!snapshot.exists()){

html = `
<div style="
grid-column:1/-1;
text-align:center;
font-size:20px;
padding:30px;
font-weight:bold;
">
ยังไม่มีสินค้า
</div>
`;

document.getElementById("products").innerHTML = html;
return;
}

snapshot.forEach((child)=>{

const data = child.val();

html += `
<div class="product-card">

<img
src="${data.image || 'https://via.placeholder.com/300'}"
alt="${data.name}"
>

<div class="product-name">
${data.name || 'ไม่มีชื่อสินค้า'}
</div>

<div class="product-price">
${data.price || '0'} บาท
</div>

<a
class="buy-btn"
href="https://www.facebook.com/share/1GKp1PqUuL/"
target="_blank">
🛒 ซื้อ
</a>

</div>
`;

});

document.getElementById("products").innerHTML = html;

},(error)=>{

console.error(error);

document.getElementById("products").innerHTML = `
<div style="
grid-column:1/-1;
text-align:center;
padding:30px;
font-size:18px;
color:red;
">
โหลดสินค้าไม่สำเร็จ
</div>
`;

});

</script>
</body>
  </html>
