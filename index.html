<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OHMMISHOPS</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f0ff;
}

.slider{
width:100%;
overflow:hidden;
}

.slider img{
width:100%;
display:block;
}

.welcome{
text-align:center;
padding:20px;
}

.login-btn{
display:inline-block;
padding:12px 25px;
background:#7c4dff;
color:white;
text-decoration:none;
border-radius:10px;
margin-top:10px;
}

.products{
padding:20px;
}

.products h2{
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.price{
color:#7c4dff;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.buy-btn{
display:block;
width:100%;
padding:12px;
margin-top:15px;
background:#1877F2;
color:white;
text-align:center;
text-decoration:none;
border-radius:10px;
}

footer{
text-align:center;
padding:20px;
color:#777;
}

</style>
</head>

<body>

<!-- สไลด์ -->

<div class="slider">
<img id="slide" src="slide1.png">
</div>

<!-- ยินดีต้อนรับ -->

<div class="welcome">

<h1>ยินดีต้อนรับสู่ OHMMISHOPS</h1>

<p>เลือกซื้อสินค้าได้ด้านล่าง</p>

<a class="login-btn" href="login.html">
เข้าสู่ระบบ
</a>

</div>

<!-- สินค้า -->

<div class="products">

<h2>รายการสินค้า</h2>

<div id="products"></div>

</div>

<footer>
OHMMISHOPS © 2026
</footer>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getDatabase,
ref,
onValue
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig = {
apiKey: "คีย์ apiKey ของคุณ",
authDomain: "ohmmishops-68928.firebaseapp.com",
databaseURL: "https://ohmmishops-68928-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ohmmishops-68928",
storageBucket: "ohmmishops-68928.firebasestorage.app",
messagingSenderId: "64123880266",
appId: "1:64123880266:web:0317d55de24fc705d137b3"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

onValue(ref(db,"products"),(snapshot)=>{

let html = "";

snapshot.forEach((child)=>{

const data = child.val();

html += `
<div class="card">

<h3>${data.name}</h3>

<div class="price">
${data.price} บาท
</div>

<a
class="buy-btn"
href="https://www.facebook.com/share/1VEJrbCzQt/"
target="_blank">

📩 ติดต่อซื้อสินค้า

</a>

</div>
`;

});

document.getElementById("products").innerHTML = html;

});

</script>

<script>

const slides = [
"slide1.png",
"slide2.png",
"slide3.png"
];

let current = 0;

setInterval(()=>{

current++;

if(current >= slides.length){
current = 0;
}

document.getElementById("slide").src =
slides[current];

},4000);

</script>

</body>
</html>
