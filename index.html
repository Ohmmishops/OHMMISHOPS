<script type="module">

import { initializeApp }
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getDatabase,
ref,
onValue
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig = {
apiKey: "AIzaSyC1aaMNIa7gfr9y6mHbIZU-OZIsq3yLSAU",
authDomain: "ohmmishops-68928.firebaseapp.com",
databaseURL: "https://ohmmishops-68928-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ohmmishops-68928",
storageBucket: "ohmmishops-68928.firebasestorage.app",
messagingSenderId: "64123880266",
appId: "1:64123880266:web:0317d55de24fc705d137b3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const slides = [
"file_000000002318720b827b073681dd573e.png",
"file_00000000b8c0720bbb5251a2ce12afc2.png",
"slide3.png"
];

let current = 0;

setInterval(()=>{

current++;

if(current >= slides.length){
current = 0;
}

document.getElementById("slide").src =
slides[current];

},4000);

onValue(ref(db,"products"),(snapshot)=>{

let html = "";

snapshot.forEach((child)=>{

const data = child.val();

html += `
<div class="product-card">

<div class="product-name">
${data.name}
</div>

<div class="product-price">
${data.price} บาท
</div>

<a class="buy-btn"
href="https://www.facebook.com/share/1GKp1PqUuL/"
target="_blank">

📩 ติดต่อซื้อสินค้า

</a>
</div>
`;

});

document.getElementById("products").innerHTML = html;

});

</script>
