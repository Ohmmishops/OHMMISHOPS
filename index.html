<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OHMMISHOPS</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f0ff;
margin:0;
padding:0;
}

header{
background:#7c4dff;
color:white;
padding:20px;
text-align:center;
}

.banner{
text-align:center;
padding:20px;
}

.menu{
text-align:center;
margin-bottom:20px;
}

.menu a{
text-decoration:none;
background:#7c4dff;
color:white;
padding:10px 15px;
border-radius:8px;
margin:5px;
display:inline-block;
}

.products{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.price{
color:#7c4dff;
font-weight:bold;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>

<img src="file_000000004a4871fa820d19cb5d6f8996.png" class="logo">

<h1>OHMMISHOPS</h1>

<p>ร้านขายไอดีเกม Roblox & Free Fire</p>

</header>

<div class="banner">
<h2>ยินดีต้อนรับสู่ OHMMISHOPS</h2>
<p>เลือกซื้อสินค้าได้ด้านล่าง</p>
</div>

<div class="menu">
<a href="login.html">เข้าสู่ระบบ</a>

</div>

<div class="products">

<h2>รายการสินค้า</h2>

<div id="products"></div>

</div>

<footer>
OHMMISHOPS © 2026
</footer>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getDatabase,
ref,
onValue
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig = {
  apiKey: "คีย์ apiKey ของคุณ",
  authDomain: "ohmmishops-68928.firebaseapp.com",
  databaseURL: "https://ohmmishops-68928-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ohmmishops-68928",
  storageBucket: "ohmmishops-68928.firebasestorage.app",
  messagingSenderId: "64123880266",
  appId: "1:64123880266:web:0317d55de24fc705d137b3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"products"),(snapshot)=>{

let html = "";

snapshot.forEach((child)=>{

const data = child.val();

html += `
<div class="card">
<h3>${data.name}</h3>
<div class="price">${data.price} บาท</div>

<a href="https://www.facebook.com/share/1VEJrbCzQt/" target="_blank">
<button style="width:100%;padding:10px;margin-top:10px;background:#1877F2;color:white;border:none;border-radius:8px;">
📩 ติดต่อซื้อสินค้า
</button>
</a>

</div>
`;

});

document.getElementById("products").innerHTML = html;

});

</script>

</body>
</html>
